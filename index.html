<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مختبر السوائل العجيب 🧪</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #fff9c4 0%, #ffeb3b 100%); min-height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; }
        .lab-card { background: white; padding: 30px; border-radius: 40px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); text-align: center; border: 8px solid #4db6ac; width: 450px; }
        h1 { color: #00796b; font-size: 26px; margin-bottom: 5px; }
        
        .funnel-container { height: 220px; position: relative; margin: 20px auto; width: 120px; transition: 0.5s; }
        .funnel { width: 100%; height: 100%; border: 5px solid #333; border-top: none; border-radius: 10px 10px 60px 60px; position: relative; background: rgba(255,255,255,0.5); overflow: hidden; }
        
        .oil-liquid { position: absolute; top: 0; width: 100%; height: 0%; background: #ffd600; transition: all 1.5s; z-index: 2; border-bottom: 2px dashed #fbc02d; }
        .water-liquid { position: absolute; bottom: 0; width: 100%; height: 0%; background: #03a9f4; transition: all 1.5s; }
        
        .tap-part { width: 15px; height: 30px; background: #333; margin: -5px auto 0; position: relative; border-radius: 0 0 5px 5px; }
        .beaker-target { width: 80px; height: 80px; border: 4px solid #555; border-top: none; border-radius: 0 0 15px 15px; margin: 40px auto 0; position: relative; background: #fff; }
        .collected-water { position: absolute; bottom: 0; width: 100%; height: 0%; background: #03a9f4; transition: 1.5s; }

        .controls { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        button { padding: 15px 20px; font-size: 18px; border: none; border-radius: 20px; cursor: pointer; color: white; font-weight: bold; box-shadow: 0 5px #ccc; transition: 0.2s; }
        .btn-mix { background: #ff5722; }
        .btn-sep { background: #009688; }
        button:active { transform: translateY(4px); box-shadow: 0 2px #666; }
        
        #msg { background: #e0f2f1; padding: 15px; border-radius: 20px; margin-top: 20px; font-size: 18px; color: #004d40; border: 2px solid #4db6ac; }

        /* حركة الاهتزاز */
        @keyframes shake { 0% { transform: rotate(0deg); } 25% { transform: rotate(5deg); } 50% { transform: rotate(-5deg); } 75% { transform: rotate(5deg); } 100% { transform: rotate(0deg); } }
        .shaking { animation: shake 0.5s infinite; }
    </style>
</head>
<body>

<div class="lab-card">
    <h1>🎨 مختبر فصل السوائل</h1>
    <p>لنفصل الزيت الأصفر عن الماء الأزرق!</p>

    <div class="funnel-container" id="funnelBox">
        <div class="funnel">
            <div id="oil" class="oil-liquid"></div>
            <div id="water" class="water-liquid"></div>
        </div>
        <div class="tap-part"></div>
    </div>

    <div class="beaker-target">
        <div id="collected" class="collected-water"></div>
    </div>

    <div class="controls">
        <button class="btn-mix" onclick="startMix()">🌪️ خلط السوائل</button>
        <button class="btn-sep" onclick="startSep()">💧 فتح الصنبور</button>
    </div>

    <div id="msg">مرحباً يا بطل! اضغط خلط لنبدأ.</div>
</div>

<audio id="soundMix" src="https://www.soundjay.com/buttons/beep-01a.mp3"></audio>
<audio id="soundWin" src="https://www.soundjay.com/human/applause-01.mp3"></audio>

<script>
    function startMix() {
        // تشغيل صوت بسيط
        document.getElementById('soundMix').play();
        
        // اهتزاز القمع
        const box = document.getElementById('funnelBox');
        box.classList.add('shaking');
        
        document.getElementById('msg').innerText = "جاري الخلط.. انتظر قليلاً!";
        
        setTimeout(() => {
            box.classList.remove('shaking');
            document.getElementById('oil').style.height = "45%";
            document.getElementById('water').style.height = "45%";
            document.getElementById('msg').innerHTML = "انظر! 😲 الزيت يرتفع للأعلى لأنه أخف من الماء.";
        }, 1500);
    }

    function startSep() {
        if(document.getElementById('water').style.height === "0%") return;

        document.getElementById('water').style.height = "0%";
        document.getElementById('collected').style.height = "100%";
        document.getElementById('oil').style.top = "50%";
        
        document.getElementById('msg').innerHTML = "رائع جداً! تم فصل الماء بنجاح 🎉";
        
        // صوت تصفيق للنجاح
        document.getElementById('soundWin').play();
    }
</script>

</body>
</html>
