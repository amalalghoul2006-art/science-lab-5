<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مختبر الفصل الذكي 🔬</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 350px; border: 5px solid #00acc1; }
        .funnel-vessel { width: 100px; height: 180px; margin: 20px auto; border: 4px solid #333; border-top: none; border-radius: 0 0 50px 50px; position: relative; background: #fff; overflow: hidden; }
        .oil-part { position: absolute; top: 0; width: 100%; height: 0%; background: #ffd600; transition: all 1s; z-index: 2; }
        .water-part { position: absolute; bottom: 0; width: 100%; height: 0%; background: #03a9f4; transition: all 1s; }
        .beaker { width: 80px; height: 60px; border: 3px solid #333; border-top: none; margin: 20px auto; position: relative; border-radius: 0 0 10px 10px; }
        .collected-water { position: absolute; bottom: 0; width: 100%; height: 0%; background: #03a9f4; transition: 1s; }
        button { padding: 12px 15px; font-size: 15px; cursor: pointer; border-radius: 12px; border: none; color: white; font-weight: bold; margin: 5px; transition: 0.2s; }
        .btn-audio { background: #e91e63; width: 100%; margin-bottom: 10px; }
        .btn-action { background: #00acc1; }
        .btn-reset { background: #ff5252; } /* هذا هو زر إعادة التجربة باللون الأحمر */
        #msg { margin-top: 15px; font-weight: bold; color: #333; min-height: 40px; background: #e0f7fa; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🧪 تحدي فصل السوائل</h2>
    <button class="btn-audio" onclick="setupAudio()">🔊 اضغط هنا لتفعيل الصوت</button>

    <div class="funnel-vessel">
        <div id="oil" class="oil-part"></div>
        <div id="water" class="water-part"></div>
    </div>

    <div class="beaker"><div id="drain" class="collected-water"></div></div>

    <button class="btn-action" onclick="mix()">🌪️ اخلط</button>
    <button class="btn-action" onclick="separate()">💧 افصل</button>
    <button class="btn-reset" onclick="resetExp()">🔄 ابدأ من جديد</button>

    <div id="msg">فعل الصوت أولاً ثم ابدأ!</div>
</div>

<script>
    let audioCtx;
    // وظيفة الصوت مدمجة ولا تحتاج إنترنت أو برامج
    function setupAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        beep(440, 0.2);
        document.getElementById('msg').innerText = "تم تفعيل الصوت! اخلط السوائل الآن.";
    }

    function beep(freq, duration) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = freq; osc.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.stop(audioCtx.currentTime + duration);
    }

    function mix() {
        if (!audioCtx) { alert("من فضلك اضغط زر تفعيل الصوت الوردي أولاً"); return; }
        beep(200, 0.3);
        document.getElementById('oil').style.height = "45%";
        document.getElementById('water').style.height = "45%";
        document.getElementById('oil').style.top = "0";
        document.getElementById('msg').innerText = "الزيت طفا فوق الماء! هل تعرف لماذا؟";
    }

    function separate() {
        if (document.getElementById('water').style.height === "0%") return;
        beep(600, 0.2); 
        setTimeout(() => beep(800, 0.4), 200);
        document.getElementById('water').style.height = "0%";
        document.getElementById('drain').style.height = "100%";
        document.getElementById('oil').style.top = "50%"; 
        document.getElementById('msg').innerText = "رائع! تم فصل الماء وبقي الزيت في القمع.";
    }

    function resetExp() {
        if (audioCtx) beep(300, 0.1);
        document.getElementById('oil').style.height = "0%";
        document.getElementById('water').style.height = "0%";
        document.getElementById('drain').style.height = "0%";
        document.getElementById('oil').style.top = "0";
        document.getElementById('msg').innerText = "تمت الإعادة! جرب مرة أخرى.";
    }
</script>
</body>
</html>
